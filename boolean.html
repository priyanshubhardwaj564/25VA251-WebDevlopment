<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booleans</title>
</head>
<body>
  <script>
     console.log(typeof true);
     console.log(5 == '5')// it will give true even if datatype is not same
     console.log(5 === '5') // it will check the datatype also
     if(false){
      console.log('hello');
     } else{
      console.log('else');
     }
     if(5){
        console.log('truthy');// every positive number is truthy while the zero is falsy
     }
  </script>
</body>
</html>
