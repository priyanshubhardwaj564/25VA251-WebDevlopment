<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Bootstrap Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; }
        header { background-color: #0d6efd; color: white; padding: 40px 0; text-align: center; }
        nav { background-color: #343a40; }
        nav a { color: #ced4da; font-weight: 500; }
        nav a:hover { color: white !important; }
        .card { border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
        .card h3 { color: #0d6efd; }
    </style>
</head>
<body>
    <header>
        <h1>Responsive Bootstrap Page</h1>
    </header>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            </ul>
        </div>
    </nav>
    <main class="container my-5">
        <div class="row">
            <div class="col-md-6">
                <div class="card p-4">
                    <h3>About Us</h3>
                    <p>Welcome to our website. We are a passionate team of developers...</p>
                    <a href="#" class="btn btn-primary">Learn More</a>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-4">
                    <h3>Our Services</h3>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item">UI/UX Design</li>
                        <li class="list-group-item">Web Development</li>
                        <li class="list-group-item">Mobile Responsive Layouts</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-dark text-light text-center py-3">
        &copy; 2025 MySite. All rights reserved.
    </footer>
</body>
</html>
