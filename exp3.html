<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLife</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 font-sans">
    <header class="bg-gradient-to-r from-slate-600 to-indigo-400 text-white py-16">
        <div class="max-w-6xl mx-auto text-center px-4">
            <h1 class="text-5xl font-bold">Transform Your Body & Mind</h1>
            <p class="mt-4 text-xl">Join FitLife today and achieve your fitness goals</p>
            <button class="mt-6 bg-white text-indigo-600 px-8 py-3 rounded-full font-semibold hover:bg-gray-100">
                Join Now
            </button>
        </div>
    </header>

    <section class="py-16 bg-white">
        <div class="max-w-6xl mx-auto px-4">
            <h2 class="text-3xl font-bold text-center mb-10">Our Programs</h2>
            <div class="grid md:grid-cols-3 gap-6">
                <div class="bg-gray-100 p-6 rounded-xl shadow text-center">
                    <h3 class="text-red-600 font-bold">Weight Training</h3>
                    <p>Build strength and muscle...</p>
                </div>
                <!-- Similar cards for Yoga and Diet Plans -->
            </div>
        </div>
    </section>

    <footer class="bg-gradient-to-r from-sky-300 to-indigo-400 text-white py-6 text-center">
        <p>&copy; 2025 FitLife | All Rights Reserved</p>
    </footer>
</body>
</html>
