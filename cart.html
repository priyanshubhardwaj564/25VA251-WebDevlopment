<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart Quantity</title>
</head>
<body>
  <button onclick="console.log(`cartquantity: ${cartquantity}`)">Show Quantity</button>

  <button onclick="
    cartquantity++;
    console.log(`cartquantity: ${cartquantity}`)
  ">Add to Cart</button>

  <button onclick ="
     cartquantity += 2;
    console.log(`cartquantity: ${cartquantity}`)
  ">+2</button>

  <button onclick ="
    cartquantity  +=  3;
    console.log(`cartquantity: ${cartquantity}`)
  ">+3</button>

  <button onclick ="
     cartquantity = 0;
     console.log(' Cart was reset:');
     console.log(`cartquantity: ${cartquantity}`)
  ">RESET CART</button>
  <script>
      let cartquantity = 0;
  </script>
</body>
</html>
